class: EnsembleLLMProver

parameters:
  ensemble_size: 8
  shuffle_seed: 0
  state_to_statement_mode: gpt
  gpt_state_to_statement_model: gpt-5.4-mini
  gpt_state_api_key_env: OPENAI_API_KEY
  gpt_state_max_output_tokens: 300

  rewriting:
    class: RewritingCanonicalization
    parameters:
      project_root: .
      timeout_seconds: 90.0
      top_rewrites: 10
      sampling:
        max_per_step: 15
        depth: 2
        only_simplifying_rewrites: true
        use_explicit_comm: true
      reranking:
        type: shortest_states
      energy:
        type: theorem_surprise

  single_pass_prover:
    class: SinglePassProver
    parameters:
      llm:
        class: VLLMChatLLM
        parameters:
          model_name_or_path: deepseek-ai/DeepSeek-Prover-V2-7B
          max_new_tokens: 2000
          max_model_len: 8192
          tensor_parallel_size: 1
          gpu_memory_utilization: 0.85
          max_num_seqs: 16

      prompt_formatter:
        class: DeepSeekProverPromptFormatter
        parameters: {}

      project_root: .
      timeout_seconds: 120.0
