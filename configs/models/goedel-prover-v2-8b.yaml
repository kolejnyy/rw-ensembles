# SinglePassProver with Goedel-LM/Goedel-Prover-V2-8B via vLLM (model-card user prompt: plan + Lean 4).
class: SinglePassProver

parameters:
  llm:
    class: VLLMChatLLM
    parameters:
      model_name_or_path: Goedel-LM/Goedel-Prover-V2-8B
      max_new_tokens: 8192
      max_model_len: 8192
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.9
      max_num_seqs: 8
      temperature: 0.7
      top_p: 0.95
      use_chat_template: true

  prompt_formatter:
    class: GoedelProverV2PromptFormatter
    parameters: {}

  project_root: .
  timeout_seconds: 120.0
